<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feverfew Foldable Card</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #ede9e1;
            margin: 0;
            font-family: 'Palatino', serif;
        }

        /* The perspective container */
        .card-wrapper {
            perspective: 1500px;
        }

        /* The main card structure */
        .book-card {
            width: 300px;
            height: 400px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1);
            background: white;
            box-shadow: 10px 10px 20px rgba(0,0,0,0.1);
            border-radius: 0 5px 5px 0;
        }

        /* The animated front cover */
        .cover {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            transform-origin: left;
            transition: transform 1.2s ease-in-out;
            transform-style: preserve-3d;
            z-index: 2;
            border-radius: 0 5px 5px 0;
            box-shadow: 2px 0 5px rgba(0,0,0,0.05);
        }

        /* Front face of the cover */
        .cover-front {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            justify-content: center;
            flex-direction: column;
            border-right: 1px solid #eee;
        }

        /* Back face of the cover (visible when open) */
        .cover-back {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #fafafa;
            transform: rotateY(180deg);
            backface-visibility: hidden;
            border-left: 1px solid #ddd;
        }

        /* The inside right page (fixed) */
        .inside-page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 40px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 1;
        }

        /* Visuals */
        .feverfew-img {
            width: 100%;
            height: 80%;
            object-fit: cover;
        }

        .cover-text {
            height: 20%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-style: italic;
            color: #556b2f;
        }

        /* Animation trigger */
        .card-wrapper.open .cover {
            transform: rotateY(-160deg);
        }

        h2 { color: #556b2f; margin-bottom: 5px; }
        p { color: #444; line-height: 1.5; font-size: 0.95rem; }
    </style>
</head>
<body>

<div class="card-wrapper" onclick="this.classList.toggle('open')">
    <div class="book-card">
        
        <div class="cover">
            <div class="cover-front">
                <img src="pngtree-a-feverfew-png-image_15891025.png" 
                     alt="Feverfew Bouquet" class="feverfew-img">
                <!-- <div class="cover-text">Click to Open</div> -->
            </div>
            <div class="cover-back"></div>
        </div>

        <div class="inside-page">
            <!-- <h2>For my lady</h2> -->
            <!-- <hr style="width: 30px; border: 0; border-top: 1px solid #ccc; margin: 15px 0;"> -->
            <p>
                May your day be as beautiful and joyful as the Feverfew flowers.
            </p>
            <p style="margin-top: 20px; font-weight: bold; color: #556b2f;">- Your man</p>
        </div>

    </div>
</div>

</body>
</html>
